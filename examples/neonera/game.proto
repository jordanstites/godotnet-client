syntax = "proto3";

package neonera;
option go_package = "example.com/neonera/pb;pb";

// Credentials sent in Login.credentials. The server unmarshals into
// this and hands it to Authenticate.
message Credentials {
  string username = 1;
  string token    = 2;
}

// A player movement update from a client.
message Move {
  float x = 1;
  float y = 2;
}

// Server's broadcast that some player moved.
message PlayerMoved {
  uint32 player_id = 1;
  float  x         = 2;
  float  y         = 3;
}

// Every game-plane frame from the client.
message ClientMessage {
  oneof body {
    Move move = 1;
  }
}

// Every game-plane frame from the server.
message ServerMessage {
  oneof body {
    PlayerMoved moved = 1;
  }
}
